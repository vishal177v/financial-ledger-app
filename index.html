<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="FinanceLedger" />
  <meta name="theme-color" content="#000000" />

  <title>FinanceLedger — Customer Account Management</title>
  <meta name="description" content="Track customer transactions with compound daily interest, overdraft management, and instant WhatsApp sharing. Works offline." />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body>

<div id="app">

  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen" role="status" aria-label="Loading FinanceLedger">
    <div class="loading-logo">
      <div class="loading-icon" aria-hidden="true">₹</div>
      <h1>FinanceLedger</h1>
      <p>Loading your data…</p>
    </div>
  </div>

  <!-- Page content -->
  <div id="page-container" aria-live="polite"></div>

  <!-- Bottom Navigation -->
  <nav id="bottom-nav" class="bottom-nav hidden" aria-label="Main Navigation">

    <!-- Home -->
    <button class="nav-btn active" id="nav-dashboard" aria-label="Dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>
      <span>Home</span>
    </button>

    <!-- Add Customer (centre FAB) -->
    <button class="nav-btn" id="nav-add-customer" aria-label="Add new customer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line>
      </svg>
      <span>ADD CUSTOMER</span>
    </button>

    <!-- Settings -->
    <button class="nav-btn" id="nav-settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <span>Settings</span>
    </button>

  </nav>
</div>

<!-- Toasts -->
<div id="toast-container" aria-live="polite" aria-atomic="false"></div>

<!-- Modals -->
<div id="modal-overlay" class="modal-overlay hidden" aria-hidden="true"></div>
<div id="modal-container" class="hidden" role="presentation"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
